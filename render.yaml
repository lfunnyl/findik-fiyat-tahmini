services:
  - type: web
    name: findik-fiyat-api
    env: python
    plan: free
    region: frankfurt  # EU - Türkiye'ye daha yakın
    buildCommand: pip install -r requirements-api.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://findik-dashboard.vercel.app,http://localhost:3000
      - key: PYTHON_VERSION
        value: "3.11.0"
    autoDeploy: true
